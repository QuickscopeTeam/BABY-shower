<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Casey & Ryan's Baby Shower</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #faf7f2;
    --warm-white: #fffef9;
    --sand: #e8dfd0;
    --blush: #e8b4a0;
    --sage: #9db4a0;
    --text: #3a3228;
    --text-muted: #7a6e62;
    --text-faint: #b0a496;
    --border: rgba(58,50,40,0.08);
  }
  html { -webkit-font-smoothing: antialiased; }
  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bg-texture {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 10% 20%, rgba(232,180,160,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(168,196,212,0.12) 0%, transparent 50%);
  }
  .card {
    position: relative; z-index: 1;
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 56px 40px;
    box-shadow: 0 2px 8px rgba(58,50,40,0.06), 0 12px 40px rgba(58,50,40,0.08);
    text-align: center;
    max-width: 420px;
    margin: 24px;
  }
  .icon { font-size: 52px; margin-bottom: 20px; }
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 500;
    color: var(--text); margin-bottom: 12px;
  }
  .sub {
    font-size: 15px; color: var(--text-muted);
    font-weight: 300; line-height: 1.7; margin-bottom: 28px;
  }
  .back-btn {
    display: inline-block;
    background: var(--text);
    color: #fff;
    text-decoration: none;
    border-radius: 100px;
    padding: 13px 28px;
    font-family: 'Jost', sans-serif;
    font-size: 14px; font-weight: 500;
    letter-spacing: 0.06em;
    transition: all 0.2s;
  }
  .back-btn:hover { background: #5a4e42; transform: translateY(-1px); }
  .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .dot { position: absolute; border-radius: 50%; opacity: 0.35; animation: float linear infinite; }
  @keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.35; } 90% { opacity: 0.35; }
    100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="bg-texture"></div>
<div class="confetti" id="confetti"></div>
<div class="card">
  <div class="icon">🌸</div>
  <div class="title">You're all set!</div>
  <div class="sub">Thank you for your RSVP — Casey & Ryan can't wait to celebrate with you. See you on March 28th!</div>
  <a href="/" class="back-btn">← Back to Invite</a>
</div>
<script>
  const colors = ['#e8b4a0','#a8c4d4','#9db4a0','#e8d08a','#d9cdb8'];
  const container = document.getElementById('confetti');
  for (let i = 0; i < 18; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    const size = Math.random() * 8 + 4;
    dot.style.cssText = `width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}%;animation-duration:${Math.random()*18+12}s;animation-delay:${Math.random()*10}s;`;
    container.appendChild(dot);
  }
</script>
</body>
</html>
